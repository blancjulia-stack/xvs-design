<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

<body>

    <header>
        <div class="logo">XVS Design</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="contact-header">
                <h1>Let's work together!</h1>
                <p>Have a project in mind, need a commission, or just want to say hello? Drop a message below!</p>
            </div>

            <!-- Contact Form -->
            <div class="form-container visible">
                <form action="https://formspree.io/f/xpqvrdbg" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Project Type</label>
                        <select id="subject" name="subject">
                            <option value="TCG-card game">TCG/ card game  Illustration</option>
                            <option value="book-cover">Custom Book Cover Illustration</option>
                            <option value="dark-fantasy">Dark Fantasy Concept / Scene</option>
                            <option value="landscape">Environment & Landscape Art</option>
                            <option value="other">Other Creative Project</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Tell me about your project ideas, timeline, and budget..." required></textarea>
                    </div>
                    <input type="hidden" name="_subject" value="New message from XVS Design">
<input type="hidden" name="_next" value="https://xvs-design.fr/contact.html?success=true">

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

            <!-- Social Links / Alternatives -->
            <div class="social-box">
                <p>Or find me directly on my social networks:</p>
                <div class="social-links">
                    <a href="https://www.instagram.com/xv_s_design/" target="_blank">Instagram</a>
                    <a href="https://x.com/BlancJulia" target="_blank">X/Twitter</a>
                    <a href="https://www.artstation.com/juliablanchard9" target="_blank">Art Station</a>
                    <a href="mailto:blanc.julia@gmail.com">E-Mail me!</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 — All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
